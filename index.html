<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAY HUB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0a0a0c;
            color: #e5e5e5;
            padding: 24px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: #121216;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            padding: 40px;
            border: 1px solid #252529;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 60px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-mark {
            background: #2a2a33;
            color: #ffffff;
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 24px;
            border: 1px solid #3d3d4a;
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .stats {
            display: flex;
            gap: 32px;
            background: #1c1c24;
            padding: 12px 28px;
            border-radius: 100px;
            border: 1px solid #2f2f3a;
        }

        .stat-item {
            text-align: center;
        }

        .stat-num {
            font-weight: 700;
            font-size: 20px;
            color: #ffffff;
        }

        .stat-label {
            font-size: 14px;
            color: #9f9fb5;
        }

        .hero {
            text-align: center;
            max-width: 700px;
            margin: 0 auto 60px;
        }

        .hero h2 {
            font-size: 48px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 16px;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .hero p {
            font-size: 18px;
            color: #ababbf;
            line-height: 1.5;
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 48px;
        }

        .cat-item {
            padding: 8px 20px;
            background: #1e1e26;
            border-radius: 40px;
            color: #c5c5d6;
            font-size: 15px;
            font-weight: 500;
            cursor: default;
            border: 1px solid #2d2d36;
        }

        .cat-item.active {
            background: #ffffff;
            color: #0a0a0c;
            border-color: #ffffff;
            font-weight: 600;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 32px;
        }

        .section-header h3 {
            font-size: 28px;
            font-weight: 600;
            color: #ffffff;
        }

        .section-header span {
            color: #8b8ba3;
            font-size: 16px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            margin-bottom: 60px;
        }

        .game-card {
            background: #18181f;
            border-radius: 24px;
            padding: 24px;
            transition: all 0.2s ease;
            border: 1px solid #2a2a33;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .game-card:hover {
            background: #1f1f28;
            border-color: #4a4a5a;
            box-shadow: 0 12px 24px -8px rgba(0,0,0,0.6);
            transform: translateY(-4px);
        }

        .game-icon {
            width: 80px;
            height: 80px;
            background: #24242e;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 20px;
            color: #ffffff;
            border: 1px solid #363642;
        }

        .game-card h4 {
            font-size: 22px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .game-card p {
            color: #9f9fb5;
            font-size: 15px;
            margin-bottom: 20px;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: #262630;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: #bdbdd5;
            border: 1px solid #363642;
        }

        .footer {
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid #2a2a33;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            color: #8b8ba3;
            font-size: 15px;
        }

        .footer-links {
            display: flex;
            gap: 28px;
        }

        .footer-links a {
            color: #b0b0c9;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-mark">🎮</div>
                <h1>PLAY HUB</h1>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-num">1</span>
                    <span class="stat-label">игра</span>
                </div>
                <div class="stat-item">
                    <span class="stat-num">5</span>
                    <span class="stat-label">слотов</span>
                </div>
                <div class="stat-item">
                    <span class="stat-num">▶</span>
                    <span class="stat-label">играй</span>
                </div>
            </div>
        </div>

        <div class="hero">
            <h2>PLAY HUB</h2>
            <p>выбери игру</p>
        </div>

        <div class="categories">
            <span class="cat-item active">все</span>
            <span class="cat-item">аркады</span>
            <span class="cat-item">классика</span>
            <span class="cat-item">новое</span>
        </div>

        <div class="section-header">
            <h3>игры</h3>
            <span>1/6</span>
        </div>

        <div class="games-grid">
            <!-- Карточка змейки (открывается в новой вкладке) -->
            <a href="#" class="game-card" onclick="openSnakeGame(); return false;">
                <div class="game-icon">🐍</div>
                <h4>Змейка</h4>
                <p>классическая</p>
                <span class="badge">играть</span>
            </a>

            <!-- Пустые слоты -->
            <div class="game-card" style="opacity: 0.5;">
                <div class="game-icon">◈</div>
                <h4>скоро</h4>
                <p></p>
                <span class="badge"></span>
            </div>
            <div class="game-card" style="opacity: 0.5;">
                <div class="game-icon">◈</div>
                <h4>скоро</h4>
                <p></p>
                <span class="badge"></span>
            </div>
            <div class="game-card" style="opacity: 0.5;">
                <div class="game-icon">◈</div>
                <h4>скоро</h4>
                <p></p>
                <span class="badge"></span>
            </div>
            <div class="game-card" style="opacity: 0.5;">
                <div class="game-icon">◈</div>
                <h4>скоро</h4>
                <p></p>
                <span class="badge"></span>
            </div>
            <div class="game-card" style="opacity: 0.5;">
                <div class="game-icon">◈</div>
                <div>
                    <h4>скоро</h4>
                    <p></p>
                </div>
                <span class="badge"></span>
            </div>
        </div>

        <div class="footer">
            <div>PLAY HUB</div>
            <div class="footer-links">
                <a href="#">○</a>
                <a href="#">○</a>
                <a href="#">○</a>
            </div>
        </div>
    </div>

    <script>
        function openSnakeGame() {
            // Создаем новое окно с игрой
            const gameWindow = window.open('', '_blank', 'width=500,height=600,left=200,top=100');
            
            // Пишем HTML для игры прямо в новое окно
            gameWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>PLAY HUB — Змейка</title>
                    <style>
                        * {
                            margin: 0;
                            padding: 0;
                            box-sizing: border-box;
                            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
                        }
                        
                        body {
                            background: #0a0a0c;
                            color: #e5e5e5;
                            display: flex;
                            justify-content: center;
                            align-items: center;
                            min-height: 100vh;
                            margin: 0;
                            padding: 20px;
                        }
                        
                        .game-wrapper {
                            background: #121216;
                            border-radius: 32px;
                            padding: 30px;
                            border: 1px solid #252529;
                            max-width: 500px;
                            width: 100%;
                        }
                        
                        .header {
                            display: flex;
                            align-items: center;
                            gap: 12px;
                            margin-bottom: 25px;
                        }
                        
                        .logo-mark {
                            background: #2a2a33;
                            color: #ffffff;
                            width: 40px;
                            height: 40px;
                            border-radius: 12px;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            font-weight: 700;
                            font-size: 20px;
                            border: 1px solid #3d3d4a;
                        }
                        
                        h2 {
                            color: #ffffff;
                            font-size: 24px;
                            font-weight: 600;
                        }
                        
                        canvas {
                            display: block;
                            margin: 0 auto;
                            border-radius: 16px;
                            background: #1a1a24;
                            border: 2px solid #363642;
                            width: 100%;
                            max-width: 400px;
                            height: auto;
                        }
                        
                        .score-board {
                            display: flex;
                            justify-content: space-between;
                            align-items: center;
                            margin-top: 20px;
                            background: #1c1c24;
                            padding: 15px 20px;
                            border-radius: 60px;
                            border: 1px solid #2f2f3a;
                        }
                        
                        .score {
                            font-size: 20px;
                            color: #ffffff;
                        }
                        
                        .score span {
                            color: #4ade80;
                            font-weight: 700;
                            margin-left: 8px;
                        }
                        
                        .restart-btn {
                            background: #2a2a33;
                            color: white;
                            border: 1px solid #4a4a5a;
                            padding: 8px 24px;
                            border-radius: 40px;
                            font-size: 14px;
                            cursor: pointer;
                            transition: all 0.2s;
                        }
                        
                        .restart-btn:hover {
                            background: #3a3a48;
                        }
                        
                        .controls {
                            text-align: center;
                            margin-top: 20px;
                            color: #9f9fb5;
                            font-size: 14px;
                        }
                        
                        .back-link {
                            display: inline-block;
                            margin-top: 20px;
                            color: #4ade80;
                            text-decoration: none;
                            font-size: 14px;
                        }
                        
                        .back-link:hover {
                            text-decoration: underline;
                        }
                    </style>
                </head>
                <body>
                    <div class="game-wrapper">
                        <div class="header">
                            <div class="logo-mark">🐍</div>
                            <h2>PLAY HUB — Змейка</h2>
                        </div>
                        
                        <canvas id="gameCanvas" width="400" height="400"></canvas>
                        
                        <div class="score-board">
                            <div class="score">Счёт <span id="score">0</span></div>
                            <button class="restart-btn" onclick="resetGame()">Заново</button>
                        </div>
                        
                        <div class="controls">
                            ← ↑ → ↓ — управление
                        </div>
                    </div>

                    <script>
                        const canvas = document.getElementById('gameCanvas');
                        const ctx = canvas.getContext('2d');
                        const scoreElement = document.getElementById('score');

                        let gridSize = 20;
                        let tileSize = canvas.width / gridSize;
                        
                        let snake = [{x: 10, y: 10}];
                        let direction = {x: 1, y: 0};
                        let food = {};
                        let score = 0;
                        let gameRunning = true;
                        let gameLoop;

                        function generateFood() {
                            do {
                                food = {
                                    x: Math.floor(Math.random() * gridSize),
                                    y: Math.floor(Math.random() * gridSize)
                                };
                            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
                        }

                        function draw() {
                            ctx.fillStyle = '#1a1a24';
                            ctx.fillRect(0, 0, canvas.width, canvas.height);

                            // Сетка
                            ctx.strokeStyle = '#2a2a35';
                            ctx.lineWidth = 0.5;
                            for (let i = 0; i <= gridSize; i++) {
                                ctx.beginPath();
                                ctx.moveTo(i * tileSize, 0);
                                ctx.lineTo(i * tileSize, canvas.height);
                                ctx.stroke();
                                ctx.beginPath();
                                ctx.moveTo(0, i * tileSize);
                                ctx.lineTo(canvas.width, i * tileSize);
                                ctx.stroke();
                            }

                            // Змейка
                            snake.forEach((segment, index) => {
                                if (index === 0) {
                                    ctx.fillStyle = '#4ade80';
                                } else {
                                    ctx.fillStyle = '#22c55e';
                                }
                                ctx.fillRect(segment.x * tileSize + 2, segment.y * tileSize + 2, tileSize - 4, tileSize - 4);
                                
                                // Глазки
                                if (index === 0) {
                                    ctx.fillStyle = '#ffffff';
                                    let eyeSize = 3;
                                    let eyeOffset = tileSize / 4;
                                    
                                    if (direction.x === 1) {
                                        ctx.fillRect(segment.x * tileSize + tileSize - eyeOffset - 2, segment.y * tileSize + eyeOffset, eyeSize, eyeSize);
                                        ctx.fillRect(segment.x * tileSize + tileSize - eyeOffset - 2, segment.y * tileSize + tileSize - eyeOffset - eyeSize, eyeSize, eyeSize);
                                    } else if (direction.x === -1) {
                                        ctx.fillRect(segment.x * tileSize + eyeOffset - 1, segment.y * tileSize + eyeOffset, eyeSize, eyeSize);
                                        ctx.fillRect(segment.x * tileSize + eyeOffset - 1, segment.y * tileSize + tileSize - eyeOffset - eyeSize, eyeSize, eyeSize);
                                    } else if (direction.y === -1) {
                                        ctx.fillRect(segment.x * tileSize + eyeOffset, segment.y * tileSize + eyeOffset - 1, eyeSize, eyeSize);
                                        ctx.fillRect(segment.x * tileSize + tileSize - eyeOffset - eyeSize, segment.y * tileSize + eyeOffset - 1, eyeSize, eyeSize);
                                    } else if (direction.y === 1) {
                                        ctx.fillRect(segment.x * tileSize + eyeOffset, segment.y * tileSize + tileSize - eyeOffset - 1, eyeSize, eyeSize);
                                        ctx.fillRect(segment.x * tileSize + tileSize - eyeOffset - eyeSize, segment.y * tileSize + tileSize - eyeOffset - 1, eyeSize, eyeSize);
                                    } else {
                                        ctx.fillRect(segment.x * tileSize + eyeOffset, segment.y * tileSize + eyeOffset, eyeSize, eyeSize);
                                        ctx.fillRect(segment.x * tileSize + tileSize - eyeOffset - eyeSize, segment.y * tileSize + eyeOffset, eyeSize, eyeSize);
                                    }
                                }
                            });

                            // Еда
                            ctx.fillStyle = '#ef4444';
                            ctx.beginPath();
                            ctx.arc(food.x * tileSize + tileSize/2, food.y * tileSize + tileSize/2, tileSize/3, 0, 2 * Math.PI);
                            ctx.fill();
                        }

                        function move() {
                            if (!gameRunning) return;

                            const head = {...snake[0]};
                            head.x += direction.x;
                            head.y += direction.y;

                            if (head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize) {
                                gameOver();
                                return;
                            }

                            if (head.x === food.x && head.y === food.y) {
                                snake = [head, ...snake];
                                score += 10;
                                scoreElement.textContent = score;
                                generateFood();
                            } else {
                                snake = [head, ...snake.slice(0, -1)];
                            }

                            for (let i = 1; i < snake.length; i++) {
                                if (snake[i].x === head.x && snake[i].y === head.y) {
                                    gameOver();
                                    return;
                                }
                            }

                            draw();
                        }

                        function gameOver() {
                            gameRunning = false;
                            clearInterval(gameLoop);
                            
                            let flashes = 0;
                            const flash = setInterval(() => {
                                if (flashes >= 3) {
                                    clearInterval(flash);
                                    return;
                                }
                                ctx.fillStyle = 'rgba(239, 68, 68, 0.3)';
                                ctx.fillRect(0, 0, canvas.width, canvas.height);
                                setTimeout(() => draw(), 100);
                                flashes++;
                            }, 200);
                        }

                        function resetGame() {
                            gameRunning = false;
                            clearInterval(gameLoop);
                            
                            snake = [{x: 10, y: 10}];
                            direction = {x: 1, y: 0};
                            score = 0;
                            scoreElement.textContent = score;
                            
                            do {
                                food = {
                                    x: Math.floor(Math.random() * gridSize),
                                    y: Math.floor(Math.random() * gridSize)
                                };
                            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
                            
                            draw();
                            
                            gameRunning = true;
                            gameLoop = setInterval(move, 150);
                        }

                        document.addEventListener('keydown', (e) => {
                            if (!gameRunning) return;
                            
                            switch(e.key) {
                                case 'ArrowUp':
                                    if (direction.y === 0) direction = {x: 0, y: -1};
                                    break;
                                case 'ArrowDown':
                                    if (direction.y === 0) direction = {x: 0, y: 1};
                                    break;
                                case 'ArrowLeft':
                                    if (direction.x === 0) direction = {x: -1, y: 0};
                                    break;
                                case 'ArrowRight':
                                    if (direction.x === 0) direction = {x: 1, y: 0};
                                    break;
                            }
                        });

                        // Старт
                        generateFood();
                        draw();
                        gameLoop = setInterval(move, 150);
                    <\/script>
                </body>
                </html>
            `);
            
            gameWindow.document.close();
        }
    </script>
</body>
</html>
